<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visor de Campos de Golf</title>
    <link rel="icon" type="image/png" href="/icons/icon_web.png" />
  </head>

  <body>
    <header class="topbar">
      <div class="topbar-title">
        <span class="topbar-title-text">Visor cartográfico interactivo de los Campos de Golf de España</span>
      </div>

      <img class="topbar-right-logo" src="/icons/golf3.png" alt="Golf" />
    </header>

    <div id="map"></div>

    <aside id="rightbar">
      <div class="panel-title">Capas del visor</div>

      <div class="panel-section">
        <div class="section-title">Mapa base</div>

        <div class="select-row">
          <select id="basemap-select">
            <option value="osm" selected>OSM</option>
            <option value="pnoa">PNOA (IGN)</option>
            <option value="mtn50">Mapa raster (IGN)</option>
          </select>
        </div>
      </div>

      <hr class="sep" />

      <div class="panel-section">
        <div class="section-title">BTN - Base Topográfica Nacional</div>

        <label class="chk">
          <input type="checkbox" id="chk-btn-puntual" checked />
          <span>Campos de golf</span>
        </label>

        <label class="chk">
          <input type="checkbox" id="chk-btn-recinto" />
          <span>Recinto del campo de golf</span>
        </label>

        <label class="chk">
          <input type="checkbox" id="chk-btn-zonas" />
          <span>Calles y greenes</span>
        </label>
      </div>

      <hr class="sep" />

      <div class="panel-section">
        <div class="section-title">OSM - OpenStreetMap</div>

        <label class="chk">
          <input type="checkbox" id="chk-osm-area" />
          <span>Áreas de juego</span>
        </label>

        <label class="chk">
          <input type="checkbox" id="chk-osm-line" />
          <span>Trayectoria del hoyo</span>
        </label>

        <label class="chk">
          <input type="checkbox" id="chk-osm-point" />
          <span>Tees/Greenes</span>
        </label>
      </div>

      <div class="panel-credits">
        <div class="credits-text">
          Trabajo Final de Diploma en Programación y Tecnologías Geoespaciales de Código Abierto
        </div>

        <div class="credits-author">Autor: Alberto Sánchez Colomer</div>

        <div class="credits-logos">
          <img src="/icons/logo_geoinnova.png" alt="Geoinnova" />
          <img src="/icons/logo_rfeg.png" alt="Real Federación Española de Golf (RFEG)" />
        </div>
      </div>
    </aside>

    <div id="popup" class="ol-popup" aria-hidden="true">
      <button id="popup-closer" class="ol-popup-closer" aria-label="Cerrar popup">×</button>
      <div id="popup-content"></div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
