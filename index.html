<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visor de Campos de Golf</title>
    <link rel="icon" type="image/png" href="/icons/icon_web.png" />
  </head>

  <body>
    <header class="topbar">
      <div class="topbar-brand">
        <img class="topbar-logo" src="/icons/logo_rfeg.png" alt="Logo RFEG" />
        <div class="topbar-title">
          <span class="topbar-kicker">Campos de golf de España</span>
          <span class="topbar-title-text">Visor cartográfico interactivo</span>
        </div>
      </div>
      <button id="toggle-rightbar" class="topbar-action" type="button" aria-label="Mostrar panel de capas">
        Capas
      </button>
    </header>

    <div id="map"></div>

    <aside id="rightbar">
      <div class="panel-header">
        <div>
          <div class="panel-title">Capas del visor</div>
          <div class="panel-subtitle">Contenido temático y mapa base</div>
        </div>
        <button id="collapse-rightbar" class="icon-btn" type="button" aria-label="Plegar panel">×</button>
      </div>

      <div class="panel-section">
        <div class="section-title">Mapa base</div>
        <div class="select-row basemap-select-row">
          <div id="basemap-picker" class="basemap-picker">
            <button
              id="basemap-picker-btn"
              class="basemap-picker-btn"
              type="button"
              aria-label="Seleccionar mapa base"
              aria-haspopup="listbox"
              aria-expanded="false"
            >
              <span class="basemap-picker-current">
                <img
                  id="basemap-current-thumb"
                  src="/icons/osm.png"
                  alt="Miniatura del mapa base seleccionado"
                />
                <span id="basemap-current-label">OpenStreetMap</span>
              </span>
              <span class="basemap-picker-caret" aria-hidden="true">▾</span>
            </button>

            <div id="basemap-picker-menu" class="basemap-picker-menu" role="listbox" aria-label="Opciones de mapa base">
              <button
                class="basemap-option"
                type="button"
                role="option"
                aria-selected="false"
                data-value="carto"
                data-label="Carto Positron"
                data-thumb="/icons/carto.png"
              >
                <img src="/icons/carto.png" alt="Miniatura Carto Positron" />
                <span class="basemap-option-text">
                  <strong>Carto Positron</strong>
                  <small>Mapa base escala de grises</small>
                </span>
              </button>

              <button
                class="basemap-option is-active"
                type="button"
                role="option"
                aria-selected="true"
                data-value="osm"
                data-label="OpenStreetMap"
                data-thumb="/icons/osm.png"
              >
                <img src="/icons/osm.png" alt="Miniatura OpenStreetMap" />
                <span class="basemap-option-text">
                  <strong>OpenStreetMap</strong>
                  <small>Mapa base de OSM</small>
                </span>
              </button>

              <button
                class="basemap-option"
                type="button"
                role="option"
                aria-selected="false"
                data-value="pnoa"
                data-label="PNOA"
                data-thumb="/icons/pnoa.png"
              >
                <img src="/icons/pnoa.png" alt="Miniatura PNOA" />
                <span class="basemap-option-text">
                  <strong>PNOA</strong>
                  <small>Ortofoto aérea</small>
                </span>
              </button>
            </div>

            <select id="basemap-select" aria-label="Seleccionar mapa base" hidden>
              <option value="carto">Carto Positron</option>
              <option value="osm" selected>OpenStreetMap</option>
              <option value="pnoa">PNOA</option>
            </select>
          </div>
        </div>
      </div>

      <hr class="sep" />

      <div class="panel-section group-section is-collapsed" data-group="btn">
        <div class="group-header">
          <label class="section-toggle group-toggle-label">
            <input type="checkbox" id="chk-group-btn" checked />
            <span class="section-title section-title-check">BTN - Base Topográfica Nacional</span>
          </label>
          <button class="group-expand-btn" type="button" aria-expanded="false" aria-label="Mostrar capas BTN">▾</button>
        </div>
        <div class="group-children">
          <label class="chk">
            <input type="checkbox" id="chk-btn-puntual" checked />
            <span>Campos de golf</span>
          </label>

          <label class="chk">
            <input type="checkbox" id="chk-btn-recinto" checked />
            <span>Recinto del campo de golf</span>
          </label>

          <label class="chk">
            <input type="checkbox" id="chk-btn-zonas" checked />
            <span>Calles y greenes</span>
          </label>
        </div>
      </div>

      <hr class="sep" />

      <div class="panel-section group-section is-collapsed" data-group="osm">
        <div class="group-header">
          <label class="section-toggle group-toggle-label">
            <input type="checkbox" id="chk-group-osm" checked />
            <span class="section-title section-title-check">OSM - OpenStreetMap</span>
          </label>
          <button class="group-expand-btn" type="button" aria-expanded="false" aria-label="Mostrar capas OSM">▾</button>
        </div>
        <div class="group-children">
          <label class="chk">
            <input type="checkbox" id="chk-osm-area" checked />
            <span>Áreas de juego</span>
          </label>

          <label class="chk">
            <input type="checkbox" id="chk-osm-line" checked />
            <span>Trayectoria del hoyo</span>
          </label>

          <label class="chk">
            <input type="checkbox" id="chk-osm-point" checked />
            <span>Tees / Greenes</span>
          </label>
        </div>
      </div>

      <hr class="sep" />

      <div class="panel-section panel-actions">
        <button id="toggle-measure-panel" class="secondary-btn" type="button">📏 Herramientas de medición</button>
        <button id="toggle-legend" class="secondary-btn" type="button">🗺️ Mostrar leyenda</button>
        <button id="clear-results" class="secondary-btn" type="button">🧹 Limpiar resultados</button>
      </div>

      <div class="panel-credits">
        <div class="credits-text">
          Trabajo Final de Diploma en Programación y Tecnologías Geoespaciales de Código Abierto
        </div>
        <div class="credits-author">Autor: Alberto Sánchez Colomer</div>
        <div class="credits-brand">
          <img src="/icons/logo_geoinnova.png" alt="Logo Geoinnova" />
        </div>
      </div>
    </aside>

    <div id="measure-panel" class="floating-panel" aria-hidden="true">
      <div class="floating-panel-title">📏 Herramientas de medición</div>
      <button id="tool-measure-line" class="secondary-btn tool-panel-btn" type="button">📏 Dibujar línea</button>
      <button id="tool-measure-area" class="secondary-btn tool-panel-btn" type="button">📐 Dibujar polígono</button>
      <button id="tool-clear-measure" class="secondary-btn tool-panel-btn" type="button">🧹 Borrar mediciones</button>
      <div id="measure-status" class="measure-status">Sin medición activa</div>
    </div>

    <div id="popup" class="ol-popup" aria-hidden="true">
      <button id="popup-closer" class="ol-popup-closer" aria-label="Cerrar popup">×</button>
      <div id="popup-content"></div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
